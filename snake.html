<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: #4ecca3;
      margin-bottom: 0.5rem;
    }

    #hud {
      display: flex;
      gap: 3rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #aaa;
    }

    #hud span {
      font-size: 1.6rem;
      font-weight: bold;
      color: #4ecca3;
      display: block;
      text-align: center;
    }

    canvas {
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      display: block;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: rgba(22, 33, 62, 0.85);
      border-radius: 8px;
    }

    #overlay h2 {
      font-size: 2rem;
      color: #e94560;
      letter-spacing: 2px;
    }

    #overlay p {
      color: #aaa;
      font-size: 1rem;
    }

    button {
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button:hover { background: #38b08a; }

    #wrapper {
      position: relative;
    }

    #level-bar {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 1px;
    }

    #home-btn {
      margin-top: 1.2rem;
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border: 2px solid #0f3460;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    #home-btn:hover {
      border-color: #4ecca3;
      color: #4ecca3;
    }
  </style>
</head>
<body>

  <h1>SNAKE</h1>

  <div id="hud">
    <div>Score <span id="score">0</span></div>
    <div>Best <span id="best">0</span></div>
    <div>Level <span id="level">1</span></div>
  </div>

  <div id="wrapper">
    <canvas id="canvas" width="600" height="500"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">SNAKE</h2>
      <p id="overlay-msg">Use arrow keys or WASD/Arrow keys to move</p>
      <button id="btn">Start Game</button>
    </div>
  </div>

  <div id="level-bar">Level up every 5 points &nbsp;·&nbsp; Speed increases each level</div>
  <a id="home-btn" href="index.html">&#8592; Back to Home</a>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const levelEl = document.getElementById('level');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const btn = document.getElementById('btn');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, best, level, speed, loop, running;

    best = 0;

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      speed = 150;
      scoreEl.textContent = 0;
      levelEl.textContent = 1;
      placeFood();
      running = true;
      overlay.style.display = 'none';
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function tick() {
      dir = nextDir;

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return gameOver();
      }

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; }
        placeFood();

        // Level up every 5 points
        const newLevel = Math.floor(score / 5) + 1;
        if (newLevel > level) {
          level = newLevel;
          levelEl.textContent = level;
          speed = Math.max(60, 150 - (level - 1) * 15);
          clearInterval(loop);
          loop = setInterval(tick, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1e2a45';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * GRID + GRID / 2 - 1, y * GRID + GRID / 2 - 1, 2, 2);
        }
      }

      // Food
      const fx = food.x * GRID + GRID / 2;
      const fy = food.y * GRID + GRID / 2;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(fx, fy, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Food glow
      ctx.shadowColor = '#e94560';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(fx, fy, GRID / 2 - 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake body
      snake.forEach((seg, i) => {
        const alpha = i === 0 ? 1 : Math.max(0.35, 1 - i * 0.04);
        ctx.fillStyle = i === 0 ? '#4ecca3' : `rgba(78, 204, 163, ${alpha})`;
        const pad = i === 0 ? 1 : 2;
        roundRect(ctx, seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad * 2, GRID - pad * 2, 4);
        ctx.fill();
      });

      // Snake eyes
      const head = snake[0];
      ctx.fillStyle = '#16213e';
      const ex = dir.x, ey = dir.y;
      const cx = head.x * GRID + GRID / 2;
      const cy = head.y * GRID + GRID / 2;
      const eyeOffset = 4;
      const perpX = -ey, perpY = ex;
      [1, -1].forEach(side => {
        ctx.beginPath();
        ctx.arc(
          cx + ex * eyeOffset + perpX * side * 3,
          cy + ey * eyeOffset + perpY * side * 3,
          2, 0, Math.PI * 2
        );
        ctx.fill();
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function saveScore() {
      const user = localStorage.getItem('arcade_username');
      if (!user) return;
      const all = JSON.parse(localStorage.getItem('arcade_scores') || '{}');
      if (!all[user]) all[user] = {};
      const s = all[user].snake || { best: 0, bestLevel: 1, gamesPlayed: 0 };
      s.gamesPlayed++;
      if (score > s.best) s.best = score;
      if (level > s.bestLevel) s.bestLevel = level;
      all[user].snake = s;
      localStorage.setItem('arcade_scores', JSON.stringify(all));
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      saveScore();
      overlayTitle.textContent = 'GAME OVER';
      overlayMsg.textContent = `Score: ${score}`;
      btn.textContent = 'Play Again';
      overlay.style.display = 'flex';
      draw();
    }

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
        case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = { x: 0, y:  1 }; break;
        case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
        case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = { x:  1, y: 0 }; break;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });

    btn.addEventListener('click', init);

    // Initial draw
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>

</body>
</html>

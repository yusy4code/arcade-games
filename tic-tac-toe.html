<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      padding: 1rem;
    }

    h1 {
      font-size: clamp(1.6rem, 7vw, 2.5rem);
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      margin-bottom: 1.2rem;
      min-height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, clamp(80px, 28vw, 110px));
      grid-template-rows: repeat(3, clamp(80px, 28vw, 110px));
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 12px rgba(168, 218, 220, 0.5);
    }

    #restart {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #restart:hover {
      background: #c73652;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-item {
      text-align: center;
    }

    .score-item span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-item.x-score span { color: #e94560; }
    .score-item.o-score span { color: #a8dadc; }
    .score-item.draw-score span { color: #888; }

    #home-btn {
      margin-top: 1.2rem;
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border: 2px solid #333;
      border-radius: 6px;
      background: transparent;
      color: #666;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    #home-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }
  </style>
</head>
<body>

  <h1>TIC TAC TOE - BY HANAA</h1>

  <div id="score">
    <div class="score-item x-score">X <span id="score-x">0</span></div>
    <div class="score-item draw-score">Draw <span id="score-draw">0</span></div>
    <div class="score-item o-score">O <span id="score-o">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="restart">Restart</button>
  <a id="home-btn" href="index.html">&#8592; Back to Home</a>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreDraw = document.getElementById('score-draw');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board = Array(9).fill('');
    let currentPlayer = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, Draw: 0 };

    function saveTTTScore(result) {
      const user = localStorage.getItem('arcade_username');
      if (!user) return;
      const all = JSON.parse(localStorage.getItem('arcade_scores') || '{}');
      if (!all[user]) all[user] = {};
      const s = all[user].ttt || { wins: 0, draws: 0, losses: 0, gamesPlayed: 0 };
      s.gamesPlayed++;
      if (result === 'Draw') s.draws++;
      else if (result === 'X') s.wins++;
      else s.losses++;
      all[user].ttt = s;
      localStorage.setItem('arcade_scores', JSON.stringify(all));
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(cell => cell)) return { winner: 'Draw', line: [] };
      return null;
    }

    function handleClick(e) {
      const idx = e.target.dataset.index;
      if (gameOver || board[idx]) return;

      board[idx] = currentPlayer;
      e.target.textContent = currentPlayer;
      e.target.classList.add(currentPlayer.toLowerCase(), 'taken');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner === 'Draw') {
          status.textContent = "It's a draw!";
          scores.Draw++;
          scoreDraw.textContent = scores.Draw;
          saveTTTScore('Draw');
        } else {
          status.textContent = `Player ${result.winner} wins!`;
          result.line.forEach(i => cells[i].classList.add('win'));
          scores[result.winner]++;
          if (result.winner === 'X') scoreX.textContent = scores.X;
          else scoreO.textContent = scores.O;
          saveTTTScore(result.winner);
        }
      } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        status.textContent = `Player ${currentPlayer}'s turn`;
      }
    }

    function restart() {
      board = Array(9).fill('');
      currentPlayer = 'X';
      gameOver = false;
      status.textContent = "Player X's turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }

    cells.forEach(cell => cell.addEventListener('click', handleClick));
    restartBtn.addEventListener('click', restart);
  </script>

</body>
</html>
